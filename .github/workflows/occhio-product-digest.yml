# L'Occhio product digest for test-scintilla.
# Requires two repository secrets:
#   ANTHROPIC_API_KEY — Claude API key; if absent, workflow silently skips
#   SCINTILLA_PAT     — personal access token with write access to the platform repo
# The workflow is inactive until secrets are configured (gate 3 activation).

name: "L'Occhio Product Digest"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  product-digest:
    name: Generate product digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check for API key
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY not configured — skipping"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout product repo
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/checkout@v4
        with:
          path: product
          fetch-depth: 0

      - name: Checkout platform repo
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/checkout@v4
        with:
          repository: Matrix-Digital-tech/scintilla
          token: ${{ secrets.SCINTILLA_PAT }}
          path: scintilla
          fetch-depth: 0

      - name: Install Claude Code
        if: steps.guard.outputs.has_key == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate digest
        if: steps.guard.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCINTILLA_HOME: ${{ github.workspace }}/scintilla
        run: |
          ${{ github.workspace }}/scintilla/scripts/occhio-product-digest.sh \
            "${{ github.workspace }}/product" \
            "test-scintilla"

      - name: Commit product repo changes
        if: steps.guard.outputs.has_key == 'true'
        run: |
          cd ${{ github.workspace }}/product
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .scintilla/ops/digests/ .scintilla/ops/alerts/
          if git diff --cached --quiet; then
            echo "No product digest changes to commit"
          else
            git commit -m "ops(digest): L'Occhio product digest test-scintilla $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Commit platform repo changes
        if: steps.guard.outputs.has_key == 'true'
        run: |
          cd ${{ github.workspace }}/scintilla
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/improvement-queue/
          if git diff --cached --quiet; then
            echo "No improvement queue items to commit"
          else
            git commit -m "ops(improvement-queue): items from test-scintilla digest $(date -u +%Y-%m-%d)"
            git push
          fi
